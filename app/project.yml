# Scoova Ride — iOS consumer navigation app.
#
# Generated into ScoovaRide.xcodeproj by XcodeGen:
#     cd app && xcodegen generate
#
# Mirrors the Android `scoova-nav-layer-android/demo` app: same screens,
# same Eye-on-Road navigation, consuming the local ScoovaNavLayer SDK.
name: ScoovaRide

options:
  bundleIdPrefix: com.scoova
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "15.0"

packages:
  ScoovaNavLayer:
    path: "../"
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    from: "6.0.0"

targets:
  ScoovaRide:
    type: application
    platform: iOS
    # A shared scheme is required so `xcodebuild -scheme ScoovaRide`
    # resolves a real buildable (otherwise the autocreated scheme reports
    # "Supported platforms ... is empty" and no destination matches).
    scheme:
      testTargets: []
    sources:
      - path: ScoovaRide
    dependencies:
      - package: ScoovaNavLayer
        product: ScoovaNavLayerCore
      - package: ScoovaNavLayer
        product: ScoovaNavLayerUI
      - package: ScoovaNavLayer
        product: ScoovaNavLayerScoovaRouting
      - package: MapLibre
        product: MapLibre
    info:
      path: ScoovaRide/Info.plist
      properties:
        CFBundleDisplayName: Scoova
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Turn-by-turn navigation keeps location + audio alive while the
        # rider's phone is locked or in their pocket (parity with the
        # Android foreground service).
        UIBackgroundModes:
          - location
          - audio
        NSLocationWhenInUseUsageDescription: >-
          Scoova uses your location during a ride to show where you are
          and guide you turn-by-turn.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scoova.ride
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
